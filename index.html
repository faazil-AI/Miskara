<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miskara Coming Soon</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

	.video-overlay {
	    position: fixed;
	    inset: 0;
	    background:
	        linear-gradient(
        	    rgba(0,0,0,0.45),
        	    rgba(0,0,0,0.55)
       	 );
    	z-index: 0;
	}

        /* Background Video */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; /* Prevent interaction */
            z-index: -1;
        }

	.overlay {
    	position: absolute;
   	 inset: 0;
    	display: flex;
   	 justify-content: center;
    	align-items: center;
    	z-index: 1;
	}

        /* Logo */
	.logo {
 	   width: clamp(180px, 35vw, 530px);
	    opacity: 0;
   	 animation: fadeIn 2s ease forwards;
	}

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <!-- Background Video -->
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="miskara-bg-video.webm" type="video/webm">
    </video>
	<div class="video-overlay"></div>

    <!-- Logo -->
    <div class="overlay">
        <img src="comingsoon.png" alt="Logo" class="logo">
        
    </div>

    <script>
        // Redirect after 3 seconds
        //setTimeout(() => {
          //  window.location.href = "miskara_final.html";
       // }, 3000);
    </script>

</body>
</html>
